<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASY-ASSISTANT</title>
    <link rel="stylesheet" href="styles.css?v=9">
  </head>
  <body>
    <main>
      <h1>EASY-ASSISTANT</h1>

      <section class="assistant-panel" aria-labelledby="assistant-heading">
        <div>
          <h2 id="assistant-heading">Create an assistant</h2>
          <form id="assistant-form">
            <label for="assistant-name">Name</label>
            <input id="assistant-name" type="text" required>

            <label for="system-prompt">System prompt</label>
            <textarea id="system-prompt" rows="4" required></textarea>

            <label for="prompt-template">Prompt template</label>
            <textarea
              id="prompt-template"
              rows="5"
              required
            >Context:
{context}

User:
{user_input}</textarea>
            <p class="field-help">
              Must include <code>{context}</code> and
              <code>{user_input}</code>.
            </p>

            <button type="submit">Create assistant</button>
            <p id="assistant-form-message" class="form-message" aria-live="polite"></p>
          </form>
        </div>

        <div>
          <h2>Created assistants</h2>
          <div id="assistant-list" class="assistant-list" aria-live="polite">
            <p>Loading assistants...</p>
          </div>
        </div>
      </section>

      <div class="app-layout">
        <section class="chat-panel" aria-label="Chat">
          <div id="messages" aria-live="polite"></div>

          <form id="chat-form">
            <div class="image-picker">
              <label for="image-input" class="image-button">Choose image</label>
              <input id="image-input" type="file" accept="image/*">
              <span id="image-filename">No image selected</span>
            </div>
            <img id="image-preview" class="image-preview" alt="Selected image preview" hidden>

            <label for="message-input">Message</label>
            <div class="input-row">
              <input
                id="message-input"
                type="text"
                placeholder="Type a message"
                required
              >
              <button type="submit">Send</button>
            </div>
          </form>
        </section>

        <section id="debug-panel" class="debug-panel" hidden>
          <h2>Context / Debug</h2>

          <h3>Prompt</h3>
          <p id="debug-prompt" class="debug-prompt">N/A</p>

          <h3>Messages sent to the model</h3>
          <div id="debug-messages"></div>

          <h3>Token usage</h3>
          <dl class="debug-values">
            <div>
              <dt>Prompt:</dt>
              <dd id="prompt-tokens">N/A</dd>
            </div>
            <div>
              <dt>Completion:</dt>
              <dd id="completion-tokens">N/A</dd>
            </div>
            <div>
              <dt>Total:</dt>
              <dd id="total-tokens">N/A</dd>
            </div>
            <div class="finish-row">
              <dt>Finish:</dt>
              <dd id="finish-reason">N/A</dd>
            </div>
          </dl>
        </section>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="app.js?v=11"></script>
  </body>
</html>
